name: Validate MCP API Keys

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/copilot/mcp.json'
      - '.github/workflows/validate-mcp-secrets.yml'

jobs:
  validate-secrets:
    name: Test MCP API Keys
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Test Gemini API Key
      id: test-gemini
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("GEMINI_API_KEY", "")
        if not key:
            print("::warning::GEMINI_API_KEY is not set")
            sys.exit(0)

        url = f"https://generativelanguage.googleapis.com/v1beta/models?key={key}"
        try:
            req = urllib.request.Request(url)
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                models = [m["name"] for m in data.get("models", [])[:3]]
                print(f"✅ GEMINI_API_KEY valid — sample models: {models}")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ GEMINI_API_KEY invalid: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        EOF

    - name: Test Tavily API Key
      id: test-tavily
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("TAVILY_API_KEY", "")
        if not key:
            print("::warning::TAVILY_API_KEY is not set")
            sys.exit(0)

        url = "https://api.tavily.com/search"
        payload = json.dumps({"api_key": key, "query": "test", "max_results": 1}).encode()
        req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                print(f"✅ TAVILY_API_KEY valid — got {len(data.get('results', []))} result(s)")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ TAVILY_API_KEY invalid: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        EOF

    - name: Test Brave Search API Key
      id: test-brave
      env:
        BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error, urllib.parse

        key = os.environ.get("BRAVE_API_KEY", "")
        if not key:
            print("::warning::BRAVE_API_KEY is not set")
            sys.exit(0)

        url = "https://api.search.brave.com/res/v1/web/search?" + urllib.parse.urlencode({"q": "test", "count": 1})
        req = urllib.request.Request(url, headers={"Accept": "application/json", "X-Subscription-Token": key})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                count = len(data.get("web", {}).get("results", []))
                print(f"✅ BRAVE_API_KEY valid — got {count} web result(s)")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ BRAVE_API_KEY invalid: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        EOF

    - name: Test Exa API Key
      id: test-exa
      env:
        EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("EXA_API_KEY", "")
        if not key:
            print("::warning::EXA_API_KEY is not set")
            sys.exit(0)

        url = "https://api.exa.ai/search"
        payload = json.dumps({"query": "test", "numResults": 1}).encode()
        req = urllib.request.Request(url, data=payload, headers={
            "Content-Type": "application/json",
            "x-api-key": key
        })
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                count = len(data.get("results", []))
                print(f"✅ EXA_API_KEY valid — got {count} result(s)")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ EXA_API_KEY invalid: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        EOF

    - name: Test Context7 API Key
      id: test-context7
      env:
        CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("CONTEXT7_API_KEY", "")
        if not key:
            print("::warning::CONTEXT7_API_KEY is not set")
            sys.exit(0)

        # Context7 MCP is invoked via npx; validate by checking the npm package exists
        # We verify the key format (ctx7sk-*) as a lightweight check
        if key.startswith("ctx7sk-") and len(key) > 10:
            print(f"✅ CONTEXT7_API_KEY present and matches expected format (ctx7sk-...)")
        else:
            print(f"⚠️  CONTEXT7_API_KEY present but format is unexpected: {key[:12]}...")
        EOF

    - name: Test Qdrant Connection
      id: test-qdrant
      env:
        QDRANT_URL: ${{ secrets.QDRANT_URL }}
        QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        url = os.environ.get("QDRANT_URL", "").rstrip("/")
        key = os.environ.get("QDRANT_API_KEY", "")
        if not url or not key:
            print("::warning::QDRANT_URL or QDRANT_API_KEY is not set")
            sys.exit(0)

        health_url = f"{url}/collections"
        req = urllib.request.Request(health_url, headers={"api-key": key})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                collections = [c["name"] for c in data.get("result", {}).get("collections", [])]
                print(f"✅ Qdrant reachable — collections: {collections if collections else '(none yet)'}")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ Qdrant connection failed: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        except Exception as e:
            print(f"❌ Qdrant connection error: {e}")
            sys.exit(1)
        EOF

    - name: Test Upstash Redis Connection
      id: test-upstash
      env:
        UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        rest_url = os.environ.get("UPSTASH_REDIS_REST_URL", "").rstrip("/")
        token = os.environ.get("UPSTASH_REDIS_REST_TOKEN", "")
        if not rest_url or not token:
            print("::warning::UPSTASH_REDIS_REST_URL or UPSTASH_REDIS_REST_TOKEN is not set")
            sys.exit(0)

        ping_url = f"{rest_url}/ping"
        req = urllib.request.Request(ping_url, headers={"Authorization": f"Bearer {token}"})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                print(f"✅ Upstash Redis reachable — PING response: {data}")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ Upstash Redis failed: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        except Exception as e:
            print(f"❌ Upstash Redis error: {e}")
            sys.exit(1)
        EOF

    - name: Test Daytona API Key
      id: test-daytona
      env:
        DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
        DAYTONA_SERVER_URL: ${{ secrets.DAYTONA_SERVER_URL }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("DAYTONA_API_KEY", "")
        server_url = os.environ.get("DAYTONA_SERVER_URL", "").rstrip("/")
        if not key or not server_url:
            print("::warning::DAYTONA_API_KEY or DAYTONA_SERVER_URL is not set")
            sys.exit(0)

        url = f"{server_url}/workspace"
        req = urllib.request.Request(url, headers={"Authorization": f"Bearer {key}", "Accept": "application/json"})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                print(f"✅ Daytona API reachable — workspaces: {len(data) if isinstance(data, list) else data}")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            if e.code == 401:
                print(f"❌ Daytona API unauthorized: HTTP {e.code} — {body[:200]}")
                sys.exit(1)
            elif e.code in (403, 404):
                print(f"✅ Daytona API reachable (HTTP {e.code}) — key accepted by server")
            else:
                print(f"❌ Daytona API failed: HTTP {e.code} — {body[:200]}")
                sys.exit(1)
        except Exception as e:
            print(f"❌ Daytona API error: {e}")
            sys.exit(1)
        EOF

    - name: Test n8n API Key
      id: test-n8n
      env:
        N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
      run: |
        python - <<'EOF'
        import os, sys, json
        import urllib.request, urllib.error

        key = os.environ.get("N8N_API_KEY", "")
        base_url = os.environ.get("N8N_BASE_URL", "").rstrip("/")
        if not key or not base_url or "your-n8n-instance" in base_url:
            print("::warning::N8N_API_KEY or N8N_BASE_URL is not set / is a placeholder")
            sys.exit(0)

        url = f"{base_url}/api/v1/workflows"
        req = urllib.request.Request(url, headers={"X-N8N-API-KEY": key, "Accept": "application/json"})
        try:
            with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())
                count = len(data.get("data", []))
                print(f"✅ n8n API reachable — {count} workflow(s) found")
        except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"❌ n8n API failed: HTTP {e.code} — {body[:200]}")
            sys.exit(1)
        except Exception as e:
            print(f"❌ n8n API error: {e}")
            sys.exit(1)
        EOF

    - name: Summarize Results
      if: always()
      run: |
        echo "## MCP API Key Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Gemini AI (GEMINI_API_KEY) | ${{ steps.test-gemini.outcome == 'success' && '✅ Passed' || steps.test-gemini.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tavily Search (TAVILY_API_KEY) | ${{ steps.test-tavily.outcome == 'success' && '✅ Passed' || steps.test-tavily.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Brave Search (BRAVE_API_KEY) | ${{ steps.test-brave.outcome == 'success' && '✅ Passed' || steps.test-brave.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Exa Neural Search (EXA_API_KEY) | ${{ steps.test-exa.outcome == 'success' && '✅ Passed' || steps.test-exa.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Context7 Docs (CONTEXT7_API_KEY) | ${{ steps.test-context7.outcome == 'success' && '✅ Passed' || steps.test-context7.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Qdrant Vector DB (QDRANT_URL + QDRANT_API_KEY) | ${{ steps.test-qdrant.outcome == 'success' && '✅ Passed' || steps.test-qdrant.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Upstash Redis (UPSTASH_REDIS_REST_*) | ${{ steps.test-upstash.outcome == 'success' && '✅ Passed' || steps.test-upstash.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Daytona Sandboxes (DAYTONA_API_KEY) | ${{ steps.test-daytona.outcome == 'success' && '✅ Passed' || steps.test-daytona.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| n8n Automation (N8N_API_KEY) | ${{ steps.test-n8n.outcome == 'success' && '✅ Passed' || steps.test-n8n.outcome == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
