spec:
  name: antigravity-workspace
  services:
    - name: backend
      dockerfile_path: Dockerfile
      github:
        repo: primoscope/antigravity-workspace-template
        branch: main
        deploy_on_push: true
      http_port: 8000
      instance_count: 1
      instance_size_slug: professional-xs
      routes:
        - path: /
      health_check:
        http_path: /health
        initial_delay_seconds: 30
        period_seconds: 30
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
      envs:
        - key: GEMINI_API_KEY
          scope: RUN_TIME
          type: SECRET
        - key: COPILOT_MCP_GITHUB_TOKEN
          scope: RUN_TIME
          type: SECRET
        - key: HOST
          scope: RUN_TIME
          value: "0.0.0.0"
        - key: PORT
          scope: RUN_TIME
          value: "8000"
        - key: ALLOWED_ORIGINS
          scope: RUN_TIME
          value: "*"
        - key: REMOTE_ACCESS
          scope: RUN_TIME
          value: "true"
        - key: DEBUG_MODE
          scope: RUN_TIME
          value: "false"
        - key: LOG_LEVEL
          scope: RUN_TIME
          value: "INFO"
  databases:
    - engine: REDIS
      name: antigravity-redis
      production: false
      version: "7"
