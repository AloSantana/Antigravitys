[pytest]
# Pytest configuration for antigravity-workspace-template

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external dependencies)
    e2e: End-to-end tests (full system tests)
    slow: Tests that take significant time
    asyncio: Async tests
    requires_ollama: Tests that require Ollama to be running
    requires_gemini: Tests that require Gemini API key

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=backend
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    -ra
    --maxfail=5

# Asyncio mode
asyncio_mode = auto

# Coverage options
[coverage:run]
source = backend,src
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */migrations/*
    */venv/*
    */env/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    pass
    \.\.\.

precision = 2
show_missing = True

[coverage:html]
directory = htmlcov

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests
timeout = 300
timeout_method = thread
