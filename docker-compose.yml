version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-backend
    environment:
      # AI Models
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VERTEX_API_KEY=${VERTEX_API_KEY}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID}
      - VERTEX_LOCATION=${VERTEX_LOCATION}
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3}
      
      # GitHub Integration
      - COPILOT_MCP_GITHUB_TOKEN=${COPILOT_MCP_GITHUB_TOKEN}
      
      # Server Configuration
      - HOST=0.0.0.0
      - PORT=${BACKEND_PORT:-8000}
      
      # Remote Access Configuration
      - REMOTE_ACCESS=${REMOTE_ACCESS:-false}
      - EXTERNAL_HOST=${EXTERNAL_HOST}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      
      # Security Settings
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - MAX_MESSAGE_LENGTH=${MAX_MESSAGE_LENGTH:-10000}
      
      # SSL Configuration
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - SSL_CERT_PATH=${SSL_CERT_PATH}
      - SSL_KEY_PATH=${SSL_KEY_PATH}
      
      # Advanced Settings
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./backend:/app/backend
      - ./drop_zone:/app/drop_zone
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - ./data.db:/app/data.db
    depends_on:
      - chromadb
      - redis
    networks:
      - antigravity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: nginx:alpine
    container_name: antigravity-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - antigravity-network
    restart: unless-stopped
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=${BACKEND_PORT:-8000}

  chromadb:
    image: chromadb/chroma:latest
    container_name: antigravity-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-FALSE}
    networks:
      - antigravity-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: antigravity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-antigravity}
    networks:
      - antigravity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: Ollama for local AI models
  ollama:
    image: ollama/ollama:latest
    container_name: antigravity-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - with-ollama

volumes:
  chroma-data:
  redis-data:
  ollama-data:

networks:
  antigravity-network:
    driver: bridge
