version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-backend
    environment:
      # AI Models
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VERTEX_API_KEY=${VERTEX_API_KEY}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID}
      - VERTEX_LOCATION=${VERTEX_LOCATION}
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3}
      
      # GitHub Integration
      - COPILOT_MCP_GITHUB_TOKEN=${COPILOT_MCP_GITHUB_TOKEN}
      
      # Server Configuration
      - HOST=0.0.0.0
      - PORT=${BACKEND_PORT:-8000}
      
      # Remote Access Configuration
      - REMOTE_ACCESS=${REMOTE_ACCESS:-false}
      - EXTERNAL_HOST=${EXTERNAL_HOST}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      
      # Security Settings
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - MAX_MESSAGE_LENGTH=${MAX_MESSAGE_LENGTH:-10000}
      
      # SSL Configuration
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - SSL_CERT_PATH=${SSL_CERT_PATH}
      - SSL_KEY_PATH=${SSL_KEY_PATH}
      
      # Advanced Settings
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./backend:/app/backend
      - ./drop_zone:/app/drop_zone
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - app-data:/app/data  # Persist conversations.db and other app data
    # NOTE: chromadb and redis are optional (in profiles).
    # Start them with: docker compose --profile with-chromadb --profile with-redis up
    networks:
      - antigravity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: nginx:alpine
    container_name: antigravity-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - antigravity-network
    restart: unless-stopped
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=${BACKEND_PORT:-8000}

  # NOTE: Backend currently uses chromadb.Client() (in-memory mode).
  # To use this persistent ChromaDB server, update backend/rag/store.py
  # to connect to http://chromadb:8000 instead of using in-memory client.
  chromadb:
    image: chromadb/chroma:latest
    container_name: antigravity-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=${ANONYMIZED_TELEMETRY:-FALSE}
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - with-chromadb

  # NOTE: No Redis client is used in the backend currently.
  # Enable this profile when Redis caching is implemented.
  redis:
    image: redis:7-alpine
    container_name: antigravity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-antigravity}
    networks:
      - antigravity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - with-redis
  # Optional: Ollama for local AI models
  ollama:
    image: ollama/ollama:latest
    container_name: antigravity-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - with-ollama

  # ── Ecosystem profile ──────────────────────────────────────────────────────
  # Start the full AI ecosystem alongside the main backend.
  # Usage: docker compose --profile ecosystem up -d
  #
  # oh-my-opencode – Sisyphus agent harness
  oh-my-opencode:
    image: node:20-alpine
    container_name: antigravity-oh-my-opencode
    working_dir: /app
    command: >
      sh -c "[ -f package.json ] && npm install --silent && npx oh-my-opencode --port 9300 || { echo 'oh-my-opencode not installed in this image'; exit 1; }"
    volumes:
      - ./ecosystem/oh-my-opencode:/app:ro
      - ./opencode.json:/app/opencode.json:ro
      - ./.opencode/oh-my-opencode.json:/app/.opencode/oh-my-opencode.json:ro
    ports:
      - "9300:9300"
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - ecosystem

  # OpenCode Agent Hub – core agent engine API
  opencode-hub:
    image: node:20-alpine
    container_name: antigravity-opencode-hub
    working_dir: /app
    command: >
      sh -c "[ -f package.json ] && npm install --silent && npx opencode serve --port 9100 || { echo 'opencode not installed in this image'; exit 1; }"
    volumes:
      - ./ecosystem/opencode:/app:ro
      - ./opencode.json:/root/.config/opencode/opencode.json:ro
    ports:
      - "9100:9100"
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - ecosystem

  # OpenClaw – personal AI assistant / message-routing gateway
  openclaw-gateway:
    image: node:20-alpine
    container_name: antigravity-openclaw
    working_dir: /app
    command: >
      sh -c "[ -f package.json ] && npm install --silent && npx openclaw --port 9200 || { echo 'openclaw not installed in this image'; exit 1; }"
    volumes:
      - ./ecosystem/openclaw:/app:ro
    ports:
      - "9200:9200"
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - ecosystem

  # Swarm-Tools – multi-agent coordination SQLite interface
  swarm-tools:
    image: python:3.11-slim
    container_name: antigravity-swarm-tools
    working_dir: /app
    command: >
      sh -c "[ -f serve.py ] && pip install -r requirements.txt -q && python serve.py --db /swarm/swarm.db || { echo 'swarm-tools serve.py not found in this image'; exit 1; }"
    volumes:
      - ./ecosystem/swarm-tools:/app:ro
      - swarm-db:/swarm
    networks:
      - antigravity-network
    restart: unless-stopped
    profiles:
      - ecosystem

volumes:
  app-data:      # Persistent app data (conversations.db, users.db, etc.)
  chroma-data:
  redis-data:
  ollama-data:
  swarm-db:      # Swarm-Tools SQLite database (ecosystem profile)

networks:
  antigravity-network:
    driver: bridge
