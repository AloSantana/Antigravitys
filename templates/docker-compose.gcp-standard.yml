# ═══════════════════════════════════════════════════════════════════════════════
# Docker Compose — GCP Standard Tier (e2-standard-4: 4 vCPU / 16 GB RAM)
#
# Optimized for budget-friendly single-project use.
# Services: Backend API + Frontend (Nginx) only.
# ChromaDB and Redis are omitted to conserve RAM.
#
# Usage:
#   cp templates/docker-compose.gcp-standard.yml docker-compose.gcp.yml
#   docker compose -f docker-compose.gcp.yml up -d
#
# Estimated resource usage at rest:
#   Backend:  ~500 MB RAM, ~0.5 vCPU
#   Frontend: ~50 MB RAM, ~0.1 vCPU
#   Total:    ~600 MB RAM (leaves ~15 GB for agents/tools)
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: antigravity-backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VERTEX_API_KEY=${VERTEX_API_KEY:-}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3}
      - COPILOT_MCP_GITHUB_TOKEN=${COPILOT_MCP_GITHUB_TOKEN}
      - HOST=0.0.0.0
      - PORT=${BACKEND_PORT:-8000}
      - REMOTE_ACCESS=true
      - EXTERNAL_HOST=${EXTERNAL_HOST}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - MAX_MESSAGE_LENGTH=${MAX_MESSAGE_LENGTH:-10000}
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./backend:/app/backend
      - ./drop_zone:/app/drop_zone
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - app-data:/app/data
    networks:
      - antigravity-network
    restart: unless-stopped
    # Standard tier: 1 CPU / 2 GB RAM limit
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (Nginx static server) ──────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: antigravity-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - antigravity-network
    restart: unless-stopped
    # Standard tier: 0.5 CPU / 512 MB RAM limit
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=${BACKEND_PORT:-8000}

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  app-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  antigravity-network:
    driver: bridge
