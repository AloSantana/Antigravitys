# ═══════════════════════════════════════════════════════════════════════════════
# Docker Compose — GCP Production Tier (n2-standard-8: 8 vCPU / 32 GB RAM)
#
# Full production stack with all services, replicas, and monitoring.
# Services: Backend (2 replicas), Frontend, ChromaDB, Redis, Watchtower
#
# Usage:
#   cp templates/docker-compose.gcp-production.yml docker-compose.gcp.yml
#   docker compose -f docker-compose.gcp.yml up -d
#
# Estimated resource usage at rest:
#   Backend (×2): ~2 GB RAM, ~1 vCPU
#   Frontend:     ~100 MB RAM
#   ChromaDB:     ~500 MB RAM
#   Redis:        ~100 MB RAM
#   Watchtower:   ~50 MB RAM
#   Total:        ~3 GB RAM (leaves ~29 GB for agents/tools/models)
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Backend API (2 replicas via scale) ──────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VERTEX_API_KEY=${VERTEX_API_KEY:-}
      - VERTEX_PROJECT_ID=${VERTEX_PROJECT_ID:-}
      - VERTEX_LOCATION=${VERTEX_LOCATION:-us-central1}
      - LOCAL_MODEL=${LOCAL_MODEL:-llama3}
      - COPILOT_MCP_GITHUB_TOKEN=${COPILOT_MCP_GITHUB_TOKEN}
      - HOST=0.0.0.0
      - PORT=8000
      - REMOTE_ACCESS=true
      - EXTERNAL_HOST=${EXTERNAL_HOST}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - MAX_MESSAGE_LENGTH=${MAX_MESSAGE_LENGTH:-10000}
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-antigravity}@redis:6379
    # Note: Use 'docker compose up -d --scale backend=2' for 2 replicas
    # (no container_name when scaling)
    expose:
      - "8000"
    volumes:
      - ./backend:/app/backend
      - ./drop_zone:/app/drop_zone
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
      - app-data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - antigravity-network
    restart: always
    # Production tier: 2 CPU / 4 GB RAM per replica
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (Nginx static server + reverse proxy) ───────────────────────────
  frontend:
    image: nginx:alpine
    container_name: antigravity-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (populated by certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - antigravity-network
    restart: always
    # Production tier: 1 CPU / 1 GB RAM
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── ChromaDB (Vector Store for RAG) ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: antigravity-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_TOKEN:-}
    networks:
      - antigravity-network
    restart: always
    # Production tier: 1 CPU / 2 GB RAM
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Redis (Caching & Session Store) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: antigravity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-antigravity}
      --maxmemory 768mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    networks:
      - antigravity-network
    restart: always
    # Production tier: 0.5 CPU / 1 GB RAM
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.05'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-antigravity}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Watchtower (Auto-update containers) ─────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: antigravity-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Check for updates every 24 hours (86400 seconds)
      - WATCHTOWER_POLL_INTERVAL=86400
      # Only monitor containers with this label
      - WATCHTOWER_LABEL_ENABLE=true
      # Send notifications (optional — set WATCHTOWER_NOTIFICATION_URL)
      - WATCHTOWER_NOTIFICATIONS=${WATCHTOWER_NOTIFICATIONS:-}
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    networks:
      - antigravity-network
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  app-data:
    driver: local
  chroma-data:
    driver: local
  redis-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  antigravity-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
